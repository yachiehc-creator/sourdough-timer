<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#E07B39">
  <meta name="description" content="酸種麵包發酵計時器 - 記錄你的烘焙旅程">
  <title>🍞 麵包計時器</title>
  <link rel="manifest" href="manifest.json">
  <!-- iOS 圖示 -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%23FDF6E3' width='180' height='180' rx='18'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' font-size='80' fill='%233D2914'%3E🍞%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%23FDF6E3' width='180' height='180' rx='18'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' font-size='80' fill='%233D2914'%3E🍞%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#FDF6E3',
            bread: '#3D2914',
            wheat: '#D4A574',
            yeast: '#E07B39',
            success: '#6B8E23',
            danger: '#C0392B',
            'light-wheat': '#E8DFD0',
          },
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #FDF6E3;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .card-active { background: #FFF8E7; border: 2px solid #E07B39; }
    .progress-bar { background: linear-gradient(90deg, #E07B39, #D4A574); }
    .btn-tap:active { transform: scale(0.96); opacity: 0.9; }
    .step-card { min-height: 120px; }
    input, textarea, select { font-size: 16px !important; }
    .has-record::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: #E07B39;
      border-radius: 50%;
    }
    .day-with-record {
      background: #FEF3E2 !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const DEFAULT_RECIPES = [
      { id: 1, name: '經典酸種麵包', ingredients: ['高筋麵粉 300g', '水 200g', '鹽 6g', '酸種 50g'], steps: [
        { id: 1, name: 'Feeding (餵養)', minutes: 480, note: '餵養活性酵種' },
        { id: 2, name: 'Autolyse (自溶)', minutes: 30, note: '混合麵粉和水，靜置' },
        { id: 3, name: 'Stretch & Fold #1', minutes: 30, note: '第一次拉伸折疊' },
        { id: 4, name: 'Stretch & Fold #2', minutes: 30, note: '第二次拉伸折疊' },
        { id: 5, name: 'Stretch & Fold #3', minutes: 30, note: '第三次拉伸折疊' },
        { id: 6, name: 'Bulk Fermentation', minutes: 240, note: '主發酵，室溫' },
        { id: 7, name: 'Shape (整形)', minutes: 15, note: '整形麵團' },
        { id: 8, name: 'Cold Proof', minutes: 720, note: '冷藏發酵' },
      ]},
      { id: 2, name: '高水份鑄鐵歐包', ingredients: ['高筋麵粉 250g', '速發酵母 3g', '糖 25g', '鹽 4g', '牛奶 160g', '奶油 30g'], steps: [
        { id: 1, name: '攪拌', minutes: 10, note: '所有材料攪拌均勻' },
        { id: 2, name: '第一次發酵', minutes: 30, note: '覆蓋保鮮膜，室溫發酵' },
        { id: 3, name: '摺疊 #1', minutes: 30, note: '第一次摺疊' },
        { id: 4, name: '摺疊 #2', minutes: 30, note: '第二次摺疊' },
        { id: 5, name: '摺疊 #3', minutes: 30, note: '第三次摺疊' },
        { id: 6, name: '冰箱冷藏水合', minutes: 5, note: '放入冰箱冷藏' },
        { id: 7, name: '排氣 & 整形', minutes: 15, note: '排出空氣，整形' },
        { id: 8, name: '第二次發酵', minutes: 45, note: '最終發酵' },
        { id: 9, name: '預熱鑄鐵鍋', minutes: 30, note: 'Sharp 水波爐預熱 250°C' },
        { id: 10, name: '鑄鐵鍋烘烤', minutes: 25, note: '蓋鍋' },
        { id: 11, name: '上色烘烤', minutes: 20, note: '230°C，開蓋' },
        { id: 12, name: '放涼', minutes: 120, note: '出爐後放涼' },
      ]},
      { id: 3, name: '貝果', ingredients: ['高筋麵粉 300g', '速發酵母 3g', '糖 15g', '鹽 5g', '水 175g'], steps: [
        { id: 1, name: '攪拌麵團', minutes: 10, note: '至光滑' },
        { id: 2, name: '基礎發酵', minutes: 30, note: '室溫' },
        { id: 3, name: '分割 & 休息', minutes: 20, note: '分割成小麵團' },
        { id: 4, name: '整形', minutes: 20, note: '整成圓形' },
        { id: 5, name: '最終發酵', minutes: 30, note: '室溫' },
        { id: 6, name: '煮貝果', minutes: 2, note: '兩面各1分鐘' },
        { id: 7, name: '烘烤', minutes: 20, note: '220°C' },
      ]}
    ];

    const RECIPES_KEY = 'sourdough-timer-recipes';
    const ACTIVE_RECIPE_KEY = 'sourdough-timer-active-recipe';
    const RECORDS_KEY = 'sourdough-timer-records';
    const SELECTED_DATE_KEY = 'sourdough-timer-selected-date';

    // Firebase 配置
    const firebaseConfig = {
      apiKey: "AIzaSyAcXlWa_cW5E-MavQRxC0yzhd4sJxt66WA",
      authDomain: "sourdough-timer.firebaseapp.com",
      projectId: "sourdough-timer",
      storageBucket: "sourdough-timer.firebasestorage.app",
      messagingSenderId: "536010769982",
      appId: "1:536010769982:web:4590491af4619f81fe336f"
    };

    // 初始化 Firebase
    let db = null;
    let firebaseReady = false;
    try {
      if (firebase && firebase.apps.length === 0) {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        // 啟用離線持久化
        db.enablePersistence({ synchronizeTabs: true }).catch((err) => {
          console.log('Firebase 離線持久化不支持:', err.code);
        });
        firebaseReady = true;
      }
    } catch (e) {
      console.log('Firebase 初始化失敗:', e);
    }

    // Firebase 同步輔助函數
    const firebaseSync = {
      isReady: () => firebaseReady && db !== null,

      // 同步食譜到 Firestore
      saveRecipes: async (recipes) => {
        if (!firebaseReady || !db) return false;
        try {
          await db.collection('settings').doc('recipes').set({ data: recipes, updatedAt: Date.now() });
          return true;
        } catch (e) { console.error('Save recipes error:', e); return false; }
      },

      // 從 Firestore 載入食譜
      loadRecipes: async () => {
        if (!firebaseReady || !db) return null;
        try {
          const doc = await db.collection('settings').doc('recipes').get();
          return doc.exists ? doc.data().data : null;
        } catch (e) { console.error('Load recipes error:', e); return null; }
      },

      // 同步 active recipe ID
      saveActiveRecipe: async (recipeId) => {
        if (!firebaseReady || !db) return false;
        try {
          await db.collection('settings').doc('activeRecipe').set({ recipeId, updatedAt: Date.now() });
          return true;
        } catch (e) { console.error('Save active recipe error:', e); return false; }
      },

      // 載入 active recipe ID
      loadActiveRecipe: async () => {
        if (!firebaseReady || !db) return null;
        try {
          const doc = await db.collection('settings').doc('activeRecipe').get();
          return doc.exists ? doc.data().recipeId : null;
        } catch (e) { console.error('Load active recipe error:', e); return null; }
      },

      // 同步記錄到 Firestore
      saveRecords: async (records) => {
        if (!firebaseReady || !db) return false;
        try {
          await db.collection('settings').doc('records').set({ data: records, updatedAt: Date.now() });
          return true;
        } catch (e) { console.error('Save records error:', e); return false; }
      },

      // 從 Firestore 載入記錄
      loadRecords: async () => {
        if (!firebaseReady || !db) return null;
        try {
          const doc = await db.collection('settings').doc('records').get();
          return doc.exists ? doc.data().data : null;
        } catch (e) { console.error('Load records error:', e); return null; }
      },

      // 初始化同步（首次載入）
      initSync: async () => {
        if (!firebaseReady || !db) return { recipes: null, activeRecipe: null, records: null };
        try {
          const [recipesDoc, activeRecipeDoc, recordsDoc] = await Promise.all([
            db.collection('settings').doc('recipes').get(),
            db.collection('settings').doc('activeRecipe').get(),
            db.collection('settings').doc('records').get()
          ]);
          return {
            recipes: recipesDoc.exists ? recipesDoc.data().data : null,
            activeRecipe: activeRecipeDoc.exists ? activeRecipeDoc.data().recipeId : null,
            records: recordsDoc.exists ? recordsDoc.data().data : null
          };
        } catch (e) {
          console.error('Init sync error:', e);
          return { recipes: null, activeRecipe: null, records: null };
        }
      }
    };

    // 使用本地日期字串 (YYYY-MM-DD)
    const formatDate = (date) => {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };
    const formatTime = (seconds) => {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    };
    const formatDisplayDate = (dateStr) => {
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      const today = formatDate(new Date());
      const yesterday = formatDate(new Date(Date.now() - 86400000));
      if (dateStr === today) return '今天';
      if (dateStr === yesterday) return '昨天';
      return `${m}/${d} ${['日', '一', '二', '三', '四', '五', '六'][date.getDay()]}`;
    };

    const playNotificationSound = () => {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        [880, 1100, 880].forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.frequency.value = freq;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.3, audioCtx.currentTime + i * 0.3);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.3 + 0.5);
          osc.start(audioCtx.currentTime + i * 0.3);
          osc.stop(audioCtx.currentTime + i * 0.3 + 0.5);
        });
      } catch (e) {}
    };

    const sendNotification = (title, body) => {
      if (Notification.permission === 'granted') {
        new Notification(title, { body, icon: '🍞', tag: 'sourdough-timer' });
      }
    };

    // 日曆彈窗
    const CalendarModal = ({ isOpen, onClose, selectedDate, onSelect, records }) => {
      if (!isOpen) return null;
      const [viewDate, setViewDate] = useState(() => {
        const [y, m, d] = selectedDate.split('-').map(Number);
        return new Date(y, m - 1, d);
      });

      const getDays = () => {
        const y = viewDate.getFullYear();
        const m = viewDate.getMonth();
        const firstDay = new Date(y, m, 1).getDay();
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        const days = [];
        for (let i = 0; i < firstDay; i++) days.push(null);
        for (let i = 1; i <= daysInMonth; i++) days.push(i);
        return days;
      };

      const days = getDays();
      const recordDates = new Set(Object.keys(records));

      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between p-4 border-b border-light-wheat">
              <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1))} className="p-2 text-wheat hover:text-bread">◀</button>
              <span className="font-semibold text-bread">{viewDate.getFullYear()}年{viewDate.getMonth() + 1}月</span>
              <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1))} className="p-2 text-wheat hover:text-bread">▶</button>
            </div>
            <div className="p-4">
              <div className="grid grid-cols-7 gap-1 text-center mb-2">
                {['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d} className="text-xs text-wheat font-semibold">{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-1">
                {days.map((day, i) => {
                  if (!day) return <div key={i} />;
                  const dateStr = formatDate(new Date(viewDate.getFullYear(), viewDate.getMonth(), day));
                  const hasRecord = recordDates.has(dateStr);
                  const isSelected = dateStr === selectedDate;
                  const isToday = dateStr === formatDate(new Date());
                  return (
                    <button key={i} onClick={() => { onSelect(dateStr); onClose(); }}
                      className={`relative aspect-square flex items-center justify-center rounded-full text-sm transition-all ${isSelected ? 'bg-yeast text-white' : 'hover:bg-light-wheat text-bread'} ${isToday && !isSelected ? 'border border-yeast' : ''} ${hasRecord && !isSelected ? 'has-record day-with-record' : ''}`}>
                      {day}
                    </button>
                  );
                })}
              </div>
            </div>
            <div className="p-4 border-t border-light-wheat text-center"><span className="text-xs text-wheat">● 有製作紀錄</span></div>
          </div>
        </div>
      );
    };

    // 歷史紀錄視圖
    const HistoryView = ({ date, records, recipes, onBack, onDeleteRecord }) => {
      const dayRecords = records[date] || [];
      return (
        <div className="max-w-3xl mx-auto px-4 py-4">
          <div className="flex items-center gap-3 mb-4">
            <button onClick={onBack} className="p-2 text-wheat hover:text-bread">◀</button>
            <h2 className="font-display text-xl font-semibold text-bread">{formatDisplayDate(date)} 的紀錄</h2>
          </div>
          {dayRecords.length === 0 ? (
            <div className="text-center py-12"><p className="text-wheat text-lg">沒有製作紀錄</p></div>
          ) : (
            <div className="space-y-4">
              {dayRecords.map((record, idx) => {
                const recipe = recipes.find(r => r.id === record.recipeId) || { name: '未知食譜', steps: [] };
                const totalTime = (record.completedSteps || []).reduce((sum, s) => sum + (s.actualSeconds || 0), 0);
                return (
                  <div key={idx} className="bg-white rounded-2xl p-5 shadow-lg">
                    <div className="flex items-start justify-between mb-3">
                      <div><span className="text-wheat text-sm font-semibold">#{idx + 1}</span>
                        <h3 className="font-display text-lg font-semibold text-bread">{recipe.name}</h3>
                      </div>
                      <div className="flex items-center gap-3">
                        <span className="text-lg font-bold text-yeast">{formatTime(totalTime)}</span>
                        <button onClick={() => onDeleteRecord(idx)} className="text-danger p-1" title="刪除紀錄">
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                      </div>
                    </div>
                    {record.notes && <p className="text-wheat text-sm mb-3 bg-cream rounded-lg p-2">{record.notes}</p>}
                    {record.photo && <img src={record.photo} alt="成品" className="w-full h-48 object-cover rounded-lg mb-3" />}
                    {record.ingredients && record.ingredients.length > 0 && (
                      <div className="mt-3 pt-3 border-t border-light-wheat">
                        <span className="text-wheat text-xs font-semibold">當次食材：</span>
                        <div className="flex flex-wrap gap-1 mt-1">
                          {record.ingredients.map((ing, i) => ing && <span key={i} className="bg-cream text-bread text-xs px-2 py-1 rounded">{ing}</span>)}
                        </div>
                      </div>
                    )}
                    <div className="space-y-2">
                      {(record.completedSteps || []).map((step, sIdx) => {
                        const stepInfo = recipe.steps.find(s => s.id === step.stepId) || { name: '未知步驟' };
                        return (
                          <div key={sIdx} className="flex items-center gap-2 text-sm">
                            <span className={`w-2 h-2 rounded-full ${step.completed ? 'bg-success' : 'bg-light-wheat'}`} />
                            <span className={step.completed ? 'text-bread' : 'text-wheat'}>{stepInfo.name}</span>
                            {step.completed && step.actualSeconds > 0 && <span className="text-wheat ml-auto">{formatTime(step.actualSeconds)}</span>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // 步驟卡片
    const StepCard = ({ step, index, isActive, isRunning, remainingSeconds, onStart, onPause, onNext, onEdit, onMoveUp, onMoveDown, onDelete, isFirst, isLast, isEditMode }) => {
      const progress = step.minutes * 60 > 0 ? ((step.minutes * 60 - remainingSeconds) / (step.minutes * 60)) * 100 : 0;
      return (
        <div className={`step-card bg-white rounded-2xl p-5 shadow-lg mb-4 transition-all ${isActive ? 'card-active' : ''}`}>
          {isEditMode ? (
            <div className="space-y-3">
              <div className="flex items-center justify-between">
                <span className="text-wheat font-semibold">步驟 {index + 1}</span>
                <button onClick={onDelete} className="text-danger p-2">🗑</button>
              </div>
              <input type="text" value={step.name} onChange={(e) => onEdit({ ...step, name: e.target.value })}
                className="w-full px-4 py-3 border border-light-wheat rounded-xl focus:outline-none focus:border-yeast font-medium text-bread" placeholder="步驟名稱" />
              <div className="flex gap-3">
                <div className="flex-1">
                  <label className="text-sm text-wheat mb-1 block">分鐘數</label>
                  <input type="number" value={step.minutes} onChange={(e) => onEdit({ ...step, minutes: Math.max(1, Math.min(999, parseInt(e.target.value) || 1)) })}
                    className="w-full px-4 py-3 border border-light-wheat rounded-xl focus:outline-none focus:border-yeast text-bread" min="1" max="999" />
                </div>
              </div>
              <textarea value={step.note || ''} onChange={(e) => onEdit({ ...step, note: e.target.value })}
                className="w-full px-4 py-3 border border-light-wheat rounded-xl focus:outline-none focus:border-yeast text-bread resize-none" rows={2} placeholder="備註內容" />
              <div className="flex gap-2">
                <button onClick={onMoveUp} disabled={isFirst} className="flex-1 py-3 bg-light-wheat rounded-xl text-bread font-semibold disabled:opacity-30 btn-tap">▲ 上移</button>
                <button onClick={onMoveDown} disabled={isLast} className="flex-1 py-3 bg-light-wheat rounded-xl text-bread font-semibold disabled:opacity-30 btn-tap">▼ 下移</button>
              </div>
            </div>
          ) : (
            <div>
              <div className="flex items-start justify-between mb-3">
                <div><span className="text-wheat text-sm font-semibold">Step {index + 1}</span>
                  <h3 className="text-bread font-display text-xl font-semibold">{step.name}</h3>
                </div>
                <div className="text-3xl font-bold text-yeast font-display">{formatTime(remainingSeconds)}</div>
              </div>
              {step.note && <p className="text-wheat text-sm mb-3">{step.note}</p>}
              <div className="h-2 bg-light-wheat rounded-full mb-4 overflow-hidden">
                <div className="h-full progress-bar transition-all duration-1000 rounded-full" style={{ width: `${Math.min(100, progress)}%` }} />
              </div>
              <div className="flex gap-3">
                {!isRunning ? (
                  <button onClick={onStart} className="flex-1 py-4 bg-yeast text-white rounded-xl font-semibold text-lg btn-tap">
                    {remainingSeconds < step.minutes * 60 ? '繼續' : '開始'}
                  </button>
                ) : (
                  <button onClick={onPause} className="flex-1 py-4 bg-wheat text-white rounded-xl font-semibold text-lg btn-tap">暫停</button>
                )}
                {isActive && <button onClick={onNext} className="px-6 py-4 bg-success text-white rounded-xl font-semibold text-lg btn-tap">下一步 →</button>}
              </div>
            </div>
          )}
        </div>
      );
    };

    // 食譜管理
    const RecipeManager = ({ recipes, activeRecipeId, onSelect, onAdd, onRename, onUpdateIngredients, isEditMode }) => {
      const [isEditing, setIsEditing] = useState(false);
      const activeRecipe = recipes.find(r => r.id === activeRecipeId);
      const handleRename = (newName) => { if (newName.trim() && newName !== activeRecipe.name) onRename(activeRecipeId, newName.trim()); setIsEditing(false); };

      return (
        <div>
          <div className="flex items-center gap-2 mb-2">
            {isEditing && !isEditMode ? (
              <input type="text" defaultValue={activeRecipe?.name} autoFocus onBlur={(e) => handleRename(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleRename(e.target.value)}
                className="px-3 py-2 border border-light-wheat rounded-xl text-bread font-semibold bg-white focus:outline-none focus:border-yeast" />
            ) : (
              <select value={activeRecipeId} onChange={(e) => onSelect(parseInt(e.target.value))}
                className="px-3 py-2 border border-light-wheat rounded-xl text-bread font-semibold bg-white focus:outline-none">
                {recipes.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
            )}
            {!isEditMode && <button onClick={() => setIsEditing(!isEditing)} className="p-2 text-wheat hover:text-bread">✏️</button>}
            {!isEditMode && <button onClick={onAdd} className="p-2 text-wheat hover:text-yeast">➕</button>}
          </div>

          {/* 食材列表 */}
          <div className="bg-white rounded-xl p-3 border border-light-wheat">
            <div className="flex items-center justify-between mb-2">
              <span className="text-wheat font-semibold text-sm">食材</span>
              {isEditMode && (
                <button onClick={() => {
                  const newIngredient = prompt('新增食材：');
                  if (newIngredient?.trim()) {
                    onUpdateIngredients(activeRecipeId, [...(activeRecipe.ingredients || []), newIngredient.trim()]);
                  }
                }} className="text-yeast text-xs font-semibold">+ 新增</button>
              )}
            </div>
            {isEditMode ? (
              <div className="space-y-1">
                {(activeRecipe.ingredients || []).map((ing, idx) => (
                  <div key={idx} className="flex items-center gap-2">
                    <input type="text" value={ing} onChange={(e) => {
                      const newIng = [...(activeRecipe.ingredients || [])];
                      newIng[idx] = e.target.value;
                      onUpdateIngredients(activeRecipeId, newIng);
                    }} className="flex-1 px-2 py-1 text-sm border border-light-wheat rounded" />
                    <button onClick={() => {
                      const newIng = (activeRecipe.ingredients || []).filter((_, i) => i !== idx);
                      onUpdateIngredients(activeRecipeId, newIng);
                    }} className="text-danger text-xs">✕</button>
                  </div>
                ))}
              </div>
            ) : (
              <div className="flex flex-wrap gap-2">
                {(activeRecipe.ingredients || []).map((ing, idx) => (
                  <span key={idx} className="bg-cream text-bread text-sm px-2 py-1 rounded-lg">{ing}</span>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    // 主應用
    const App = () => {
      const [recipes, setRecipes] = useState(() => {
        try {
          const saved = localStorage.getItem(RECIPES_KEY);
          if (!saved) return DEFAULT_RECIPES;
          const parsed = JSON.parse(saved);
          // 確保每個食譜都有 ingredients 和 steps 欄位（從預設食譜取得）
          return parsed.map((r, i) => ({
            ...r,
            ingredients: r.ingredients || DEFAULT_RECIPES[i]?.ingredients || [],
            steps: r.steps?.length > 0 ? r.steps : (DEFAULT_RECIPES[i]?.steps || [])
          }));
        } catch { return DEFAULT_RECIPES; }
      });
      const [activeRecipeId, setActiveRecipeId] = useState(() => {
        try {
          const saved = localStorage.getItem(ACTIVE_RECIPE_KEY);
          // 如果沒有儲存過，或是舊的值，改為預設食譜 2（高水份鑄鐵歐包）
          if (!saved || saved === '1') {
            localStorage.setItem(ACTIVE_RECIPE_KEY, '2');
            return 2;
          }
          return parseInt(saved);
        } catch { return 2; }
      });
      // 預設假資料：2026年4月9日
      const DEFAULT_RECORDS = {
        '2026-04-09': [{
          recipeId: 1,
          completedSteps: [
            { stepId: 1, completed: true, actualSeconds: 47640 },
            { stepId: 2, completed: true, actualSeconds: 1845 },
            { stepId: 3, completed: true, actualSeconds: 1820 },
            { stepId: 4, completed: true, actualSeconds: 1810 },
            { stepId: 5, completed: true, actualSeconds: 1800 },
            { stepId: 6, completed: true, actualSeconds: 8700 },
            { stepId: 7, completed: true, actualSeconds: 920 },
            { stepId: 8, completed: true, actualSeconds: 43200 }
          ],
          notes: '第一次嘗試，麵包發酵得很好！',
          createdAt: Date.now()
        }]
      };

      const [records, setRecords] = useState(() => {
        try {
          const saved = localStorage.getItem(RECORDS_KEY);
          let parsed = saved ? JSON.parse(saved) : {};
          // 強制合併假資料（確保有 4/9 紀錄）
          parsed = { ...DEFAULT_RECORDS, ...parsed };
          localStorage.setItem(RECORDS_KEY, JSON.stringify(parsed));
          return parsed;
        } catch { return DEFAULT_RECORDS; }
      });
      const [selectedDate, setSelectedDate] = useState(() => { try { return localStorage.getItem(SELECTED_DATE_KEY) || formatDate(new Date()); } catch { return formatDate(new Date()); } });
      const [showCalendar, setShowCalendar] = useState(false);
      const [isHistoryView, setIsHistoryView] = useState(false);
      const [isEditMode, setIsEditMode] = useState(false);
      const [activeStep, setActiveStep] = useState(0);
      const [runningStep, setRunningStep] = useState(null);
      const [remainingTime, setRemainingTime] = useState({});
      const [sessionNotes, setSessionNotes] = useState('');
      const [sessionPhoto, setSessionPhoto] = useState(null);
      const [sessionIngredients, setSessionIngredients] = useState([]);
      const [stepTimes, setStepTimes] = useState({});
      const [completedSteps, setCompletedSteps] = useState([]);
      const [syncStatus, setSyncStatus] = useState('idle'); // idle, syncing, synced, error
      const [isInitialLoad, setIsInitialLoad] = useState(true);

      // Firebase 初始化同步 - 首次載入時從 Firebase 獲取數據
      useEffect(() => {
        if (!firebaseSync.isReady()) {
          setIsInitialLoad(false);
          return;
        }

        const loadFromFirebase = async () => {
          setSyncStatus('syncing');
          try {
            const cloudData = await firebaseSync.initSync();

            // 載入食譜
            if (cloudData.recipes) {
              setRecipes(cloudData.recipes);
            }
            // 載入 active recipe
            if (cloudData.activeRecipe) {
              setActiveRecipeId(cloudData.activeRecipe);
            }
            // 載入記錄
            if (cloudData.records) {
              // 合併預設、本地和雲端數據（雲端優先）
              const localRecords = JSON.parse(localStorage.getItem(RECORDS_KEY) || '{}');
              const mergedRecords = { ...DEFAULT_RECORDS, ...localRecords, ...cloudData.records };
              setRecords(mergedRecords);
            }

            setSyncStatus('synced');
          } catch (e) {
            console.error('Initial sync error:', e);
            setSyncStatus('error');
          }
          setIsInitialLoad(false);
        };

        loadFromFirebase();
      }, []);

      // 當數據變化時自動同步到 Firebase
      useEffect(() => {
        if (isInitialLoad || !firebaseSync.isReady()) return;
        firebaseSync.saveRecipes(recipes);
      }, [recipes, isInitialLoad]);

      useEffect(() => {
        if (isInitialLoad || !firebaseSync.isReady()) return;
        firebaseSync.saveActiveRecipe(activeRecipeId);
      }, [activeRecipeId, isInitialLoad]);

      useEffect(() => {
        if (isInitialLoad || !firebaseSync.isReady()) return;
        firebaseSync.saveRecords(records);
      }, [records, isInitialLoad]);

      const handleManualSync = async () => {
        if (!firebaseSync.isReady()) {
          alert('Firebase 未初始化，請檢查網絡連接');
          return;
        }
        setSyncStatus('syncing');
        try {
          const cloudData = await firebaseSync.initSync();
          if (cloudData.recipes) setRecipes(cloudData.recipes);
          if (cloudData.activeRecipe) setActiveRecipeId(cloudData.activeRecipe);
          if (cloudData.records) {
            const localRecords = JSON.parse(localStorage.getItem(RECORDS_KEY) || '{}');
            const mergedRecords = { ...DEFAULT_RECORDS, ...localRecords, ...cloudData.records };
            setRecords(mergedRecords);
          }
          setSyncStatus('synced');
        } catch (e) {
          setSyncStatus('error');
        }
      };

      const activeRecipe = recipes.find(r => r.id === activeRecipeId) || recipes[0];
      const steps = activeRecipe?.steps || [];
      const isToday = selectedDate === formatDate(new Date());

      // 初始化當次食材（從食譜複製，不影響原始配方）
      useEffect(() => {
        setSessionIngredients([...(activeRecipe?.ingredients || [])]);
      }, [activeRecipeId]);

      useEffect(() => {
        const initial = {};
        steps.forEach(s => { initial[s.id] = s.minutes * 60; });
        setRemainingTime(initial);
        setActiveStep(0);
        setRunningStep(null);
        setStepTimes({});
        setCompletedSteps([]);
      }, [activeRecipeId]);

      useEffect(() => { localStorage.setItem(RECIPES_KEY, JSON.stringify(recipes)); }, [recipes]);
      useEffect(() => { localStorage.setItem(ACTIVE_RECIPE_KEY, activeRecipeId.toString()); }, [activeRecipeId]);
      useEffect(() => { localStorage.setItem(RECORDS_KEY, JSON.stringify(records)); }, [records]);
      useEffect(() => { localStorage.setItem(SELECTED_DATE_KEY, selectedDate); }, [selectedDate]);

      useEffect(() => {
        let interval;
        if (runningStep !== null) {
          const step = steps.find(s => s.id === runningStep);
          if (!step) return;
          interval = setInterval(() => {
            setRemainingTime(prev => {
              const current = prev[runningStep] || 0;
              // 第8步結束前30分鐘提醒預熱（第8步45分鐘，還剩30分鐘=1800秒時提醒）
              if (runningStep === 8 && current === 1800) {
                playNotificationSound();
                sendNotification('🔔 提醒', '準備預熱鑄鐵鍋！還有 30 分鐘');
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
              }
              if (current <= 1) {
                clearInterval(interval);
                setRunningStep(null);
                playNotificationSound();
                sendNotification('⏰ 時間到！', `${step.name} 完成`);
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                return { ...prev, [runningStep]: 0 };
              }
              return { ...prev, [runningStep]: current - 1 };
            });
          }, 1000);
        }
        return () => clearInterval(interval);
      }, [runningStep, steps]);

      const saveRecord = useCallback((completed) => {
        if (completed.length === 0) return;
        const newRecord = { recipeId: activeRecipeId, completedSteps: completed, notes: sessionNotes, photo: sessionPhoto, ingredients: sessionIngredients, createdAt: Date.now() };
        setRecords(prev => ({ ...prev, [selectedDate]: [...(prev[selectedDate] || []), newRecord] }));
        // Clear after save
        setSessionPhoto(null);
        setSessionIngredients([...(activeRecipe?.ingredients || [])]);
      }, [activeRecipeId, selectedDate, sessionNotes, sessionPhoto, sessionIngredients, activeRecipe]);

      const handleNext = () => {
        const currentStep = steps[activeStep];
        const actualTime = (currentStep.minutes * 60) - remainingTime[currentStep.id];
        setStepTimes(prev => ({ ...prev, [currentStep.id]: (prev[currentStep.id] || 0) + actualTime }));
        setCompletedSteps(prev => [...prev, { stepId: currentStep.id, completed: true, actualSeconds: actualTime }]);

        // 步驟完成通知
        playNotificationSound();
        sendNotification('✅ 步驟完成', `${currentStep.name} 完成！`);
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

        if (activeStep < steps.length - 1) {
          const nextStep = steps[activeStep + 1];
          setActiveStep(activeStep + 1);
          setRunningStep(nextStep.id);
          setRemainingTime(prev => ({ ...prev, [nextStep.id]: nextStep.minutes * 60 }));
        } else {
          setRunningStep(null);
          // 完成所有步驟
          saveRecord([...completedSteps, { stepId: currentStep.id, completed: true, actualSeconds: actualTime }]);
          playNotificationSound();
          playNotificationSound();
          sendNotification('🎉 恭喜完成！', '所有步驟已完成，麵包出爐！');
          if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }
      };

      const handleStart = (stepId) => {
        if (Notification.permission === 'default') Notification.requestPermission();
        setRunningStep(stepId);
        if (activeStep !== steps.findIndex(s => s.id === stepId)) setActiveStep(steps.findIndex(s => s.id === stepId));
      };
      const handlePause = () => setRunningStep(null);

      const updateActiveRecipe = (updater) => setRecipes(recipes.map(r => r.id === activeRecipeId ? updater(r) : r));

      const handleEdit = (updatedStep) => {
        updateActiveRecipe(recipe => ({ ...recipe, steps: recipe.steps.map(s => s.id === updatedStep.id ? updatedStep : s) }));
        if (remainingTime[updatedStep.id] === undefined) setRemainingTime(prev => ({ ...prev, [updatedStep.id]: updatedStep.minutes * 60 }));
      };

      const handleMoveUp = (index) => { if (index === 0) return; updateActiveRecipe(recipe => { const newSteps = [...recipe.steps]; [newSteps[index - 1], newSteps[index]] = [newSteps[index], newSteps[index - 1]]; return { ...recipe, steps: newSteps }; }); };
      const handleMoveDown = (index) => { if (index === steps.length - 1) return; updateActiveRecipe(recipe => { const newSteps = [...recipe.steps]; [newSteps[index], newSteps[index + 1]] = [newSteps[index + 1], newSteps[index]]; return { ...recipe, steps: newSteps }; }); };

      const handleDeleteStep = (id) => { if (confirm('確定要刪除這個步驟嗎？')) updateActiveRecipe(recipe => ({ ...recipe, steps: recipe.steps.filter(s => s.id !== id) })); };
      const handleAddStep = () => { const maxId = Math.max(...steps.map(s => s.id), 0); updateActiveRecipe(recipe => ({ ...recipe, steps: [...recipe.steps, { id: maxId + 1, name: '新步驟', minutes: 30, note: '' }] })); };

      const handleReset = () => {
        if (confirm('重置所有計時？')) {
          const initial = {}; steps.forEach(s => { initial[s.id] = s.minutes * 60; });
          setRemainingTime(initial); setActiveStep(0); setRunningStep(null); setStepTimes({}); setCompletedSteps([]);
        }
      };

      const handleAddRecipe = () => { const newId = Math.max(...recipes.map(r => r.id), 0) + 1; setRecipes([...recipes, { id: newId, name: '新食譜', steps: [{ id: 1, name: '新步驟', minutes: 30, note: '' }] }]); setActiveRecipeId(newId); };
      const handleRenameRecipe = (id, newName) => setRecipes(recipes.map(r => r.id === id ? { ...r, name: newName } : r));
      const handleUpdateIngredients = (id, ingredients) => setRecipes(recipes.map(r => r.id === id ? { ...r, ingredients } : r));
      const handleDeleteRecipe = () => { if (recipes.length <= 1) { alert('至少需要一個食譜'); return; } if (confirm(`確定要刪除「${activeRecipe.name}」嗎？`)) { const newRecipes = recipes.filter(r => r.id !== activeRecipeId); setRecipes(newRecipes); setActiveRecipeId(newRecipes[0].id); } };

      const handleDateSelect = (dateStr) => { setSelectedDate(dateStr); setIsHistoryView(dateStr !== formatDate(new Date())); };

      return (
        <div className="min-h-screen pb-8">
          <CalendarModal isOpen={showCalendar} onClose={() => setShowCalendar(false)} selectedDate={selectedDate} onSelect={handleDateSelect} records={records} />

          <header className="bg-white shadow-sm sticky top-0 z-10">
            <div className="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
              <h1 className="font-display text-2xl font-bold text-bread">🍞 Sourdough</h1>
              <div className="flex gap-2 items-center">
                {/* Firebase 同步狀態 */}
                <button onClick={handleManualSync} className={`p-2 rounded-lg btn-tap ${syncStatus === 'synced' ? 'text-success' : syncStatus === 'syncing' ? 'text-yeast animate-pulse' : syncStatus === 'error' ? 'text-danger' : 'text-wheat hover:text-bread'}`} title={firebaseSync.isReady() ? '同步到雲端' : 'Firebase 未連接'}>
                  {syncStatus === 'syncing' ? '↻' : syncStatus === 'synced' ? '✓' : syncStatus === 'error' ? '!' : '☁'}
                </button>
                <button onClick={handleReset} className="p-3 text-wheat hover:text-bread" title="重置">🔄</button>
                <button onClick={() => setIsEditMode(!isEditMode)} className={`px-4 py-2 rounded-xl font-semibold btn-tap ${isEditMode ? 'bg-yeast text-white' : 'bg-light-wheat text-bread'}`}>{isEditMode ? '完成' : '編輯'}</button>
              </div>
            </div>

            {/* 日期選擇器 */}
            <div className="max-w-3xl mx-auto px-4 pb-4">
              <button onClick={() => setShowCalendar(true)} className="flex items-center gap-2 text-bread font-semibold hover:text-yeast transition-colors">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                <span className="text-lg">{isToday ? '今天' : formatDisplayDate(selectedDate)}</span>
              </button>
            </div>

            {!isEditMode && <div className="max-w-3xl mx-auto px-4 pb-4"><RecipeManager recipes={recipes} activeRecipeId={activeRecipeId} onSelect={setActiveRecipeId} onAdd={handleAddRecipe} onRename={handleRenameRecipe} onUpdateIngredients={handleUpdateIngredients} isEditMode={false} /></div>}
          </header>

          {/* 編輯模式 */}
          {isEditMode && (
            <div className="max-w-3xl mx-auto px-4 py-3 bg-white border-b border-light-wheat">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-2">
                  <select value={activeRecipeId} onChange={(e) => setActiveRecipeId(parseInt(e.target.value))} className="px-3 py-2 border border-light-wheat rounded-xl text-bread font-semibold bg-white">
                    {recipes.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                  </select>
                  <button onClick={handleDeleteRecipe} className="p-2 text-danger">🗑</button>
                </div>
                <button onClick={handleAddRecipe} className="px-4 py-2 bg-yeast text-white rounded-xl font-semibold btn-tap">+ 新食譜</button>
              </div>
              <RecipeManager recipes={recipes} activeRecipeId={activeRecipeId} onSelect={setActiveRecipeId} onAdd={handleAddRecipe} onRename={handleRenameRecipe} onUpdateIngredients={handleUpdateIngredients} isEditMode={true} />
            </div>
          )}

          {/* 歷史紀錄視圖 */}
          {isHistoryView && !isEditMode ? (
            <HistoryView date={selectedDate} records={records} recipes={recipes} onBack={() => setIsHistoryView(false)} onDeleteRecord={(idx) => {
              if (confirm('確定要刪除這筆紀錄嗎？')) {
                setRecords(prev => ({
                  ...prev,
                  [selectedDate]: prev[selectedDate].filter((_, i) => i !== idx)
                }));
              }
            }} />
          ) : (
          <>
            {/* 今日已有紀錄提示 */}
            {isToday && records[selectedDate]?.length > 0 && (
              <div className="max-w-3xl mx-auto px-4 pt-2">
                <div className="bg-success/10 border border-success rounded-xl p-3 mb-3">
                  <div className="flex items-center justify-between">
                    <span className="text-success font-semibold text-sm">今日已有 {records[selectedDate].length} 筆記錄</span>
                    <button onClick={() => setIsHistoryView(true)} className="text-success font-semibold text-sm hover:underline">查看 →</button>
                  </div>
                </div>
              </div>
            )}

              {!isEditMode && steps.length > 0 && (
                <div className="max-w-3xl mx-auto px-4 py-3">
                  <div className="flex items-center gap-2 text-sm text-wheat"><span>進度</span>
                    <div className="flex-1 h-2 bg-light-wheat rounded-full overflow-hidden">
                      <div className="h-full bg-success transition-all" style={{ width: `${((activeStep + (runningStep !== null ? 0.5 : 0)) / steps.length) * 100}%` }} />
                    </div>
                    <span>{activeStep + 1} / {steps.length}</span>
                  </div>
                </div>
              )}

              <main className="max-w-3xl mx-auto px-4 pt-2">
                {steps.length === 0 ? (
                  <div className="text-center py-12"><p className="text-wheat text-lg mb-4">尚無步驟</p><button onClick={handleAddStep} className="px-6 py-3 bg-yeast text-white rounded-xl font-semibold btn-tap">+ 新增步驟</button></div>
                ) : (
                  <>
                    {steps.map((step, index) => (
                      <StepCard key={step.id} step={step} index={index} isActive={index === activeStep} isRunning={runningStep === step.id}
                        remainingSeconds={remainingTime[step.id] ?? step.minutes * 60} onStart={() => handleStart(step.id)} onPause={handlePause} onNext={handleNext}
                        onEdit={handleEdit} onMoveUp={() => handleMoveUp(index)} onMoveDown={() => handleMoveDown(index)} onDelete={() => handleDeleteStep(step.id)}
                        isFirst={index === 0} isLast={index === steps.length - 1} isEditMode={isEditMode} />
                    ))}
                    {isEditMode && <button onClick={handleAddStep} className="w-full py-4 border-2 border-dashed border-wheat text-wheat rounded-2xl font-semibold mb-4 hover:bg-white">+ 新增步驟</button>}
                  </>
                )}
              </main>

              {/* 備註、食材與照片輸入 */}
              {!isEditMode && isToday && (
                <div className="max-w-3xl mx-auto px-4 mt-4 space-y-3">
                  <textarea value={sessionNotes} onChange={(e) => setSessionNotes(e.target.value)}
                    placeholder="新增備註（可選）..." className="w-full px-4 py-3 border border-light-wheat rounded-xl focus:outline-none focus:border-yeast text-bread resize-none" rows={2} />

                  {/* 當次食材編輯 */}
                  <div className="bg-white rounded-xl p-4 border border-light-wheat">
                    <div className="flex items-center justify-between mb-2">
                      <span className="text-wheat font-semibold">當次食材（可編輯）</span>
                      <button onClick={() => setSessionIngredients([...sessionIngredients, ''])} className="text-yeast text-xs font-semibold">+ 新增</button>
                    </div>
                    <div className="space-y-2">
                      {sessionIngredients.map((ing, idx) => (
                        <div key={idx} className="flex items-center gap-2">
                          <input type="text" value={ing} onChange={(e) => {
                            const newIng = [...sessionIngredients];
                            newIng[idx] = e.target.value;
                            setSessionIngredients(newIng);
                          }} placeholder="食材與份量" className="flex-1 px-3 py-2 border border-light-wheat rounded-lg text-bread text-sm" />
                          <button onClick={() => setSessionIngredients(sessionIngredients.filter((_, i) => i !== idx))} className="text-danger p-1">✕</button>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* 照片上傳 */}
                  <div className="bg-white rounded-xl p-4 border border-light-wheat">
                    {sessionPhoto ? (
                      <div className="relative">
                        <img src={sessionPhoto} alt="成品" className="w-full h-48 object-cover rounded-lg" />
                        <button onClick={() => setSessionPhoto(null)} className="absolute top-2 right-2 bg-danger text-white rounded-full p-1">
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                      </div>
                    ) : (
                      <label className="flex flex-col items-center justify-center py-4 cursor-pointer">
                        <svg className="w-10 h-10 text-wheat mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <span className="text-wheat font-semibold">上傳成品照片</span>
                        <span className="text-wheat text-xs mt-1">（可選）</span>
                        <input type="file" accept="image/*" className="hidden" onChange={(e) => {
                          const file = e.target.files[0];
                          if (file) {
                            const reader = new FileReader();
                            reader.onloadend = () => setSessionPhoto(reader.result);
                            reader.readAsDataURL(file);
                          }
                        }} />
                      </label>
                    )}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // PWA 安裝提示
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // 顯示安裝按鈕（如果有的話）
      if (installBtn) installBtn.style.display = 'block';
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
    });

    // Service Worker 註冊
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          console.log('SW registered:', reg.scope);
          // 檢查更新
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // 有新版本
                if (confirm('🔄 有新版本可用！是否刷新取得最新版本？')) {
                  window.location.reload();
                }
              }
            });
          });
        }).catch(err => {
          console.log('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
